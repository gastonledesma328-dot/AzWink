<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AzWink OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: transparent;
  width: 100vw; height: 100vh;
  display: flex; align-items: flex-end; justify-content: flex-start;
  padding: 32px; overflow: hidden;
  font-family: 'DM Mono', monospace;
}

.card {
  display: flex; align-items: center; gap: 18px;
  background: rgba(10,10,15,0.88);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(232,255,77,0.35);
  border-radius: 20px; padding: 16px 24px;
  min-width: 300px; max-width: 520px;
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.4s cubic-bezier(.22,1,.36,1), transform 0.4s cubic-bezier(.22,1,.36,1);
  pointer-events: none;
}
.card.visible  { opacity:1; transform:translateY(0); }
.card.hiding   { opacity:0; transform:translateY(20px); }

.avatar {
  width:48px; height:48px; border-radius:50%;
  background: linear-gradient(135deg,#e8ff4d,#4dffb4);
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem;
  color:#0a0a0f; flex-shrink:0;
}

.info { flex:1; min-width:0; }
.lbl { font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:#7a7a9a; margin-bottom:2px; display:flex; align-items:center; gap:6px; }
.dot { width:6px; height:6px; border-radius:50%; background:#e8ff4d; animation:blink 1s infinite; }
.name { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; color:#f0f0ff; letter-spacing:-.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.waveform { display:flex; align-items:center; gap:3px; height:40px; flex-shrink:0; }
.bar { width:3px; border-radius:10px; background:#e8ff4d; height:4px; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* unlock btn */
#unlock-btn {
  position:fixed; bottom:6px; right:6px;
  width:16px; height:16px; border-radius:50%;
  background:rgba(232,255,77,.2); border:1px solid rgba(232,255,77,.4);
  cursor:pointer; padding:0; z-index:99;
}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="avatar" id="avatar">?</div>
  <div class="info">
    <div class="lbl"><div class="dot"></div>audio de</div>
    <div class="name" id="sender">Anónimo</div>
  </div>
  <div class="waveform" id="waveform"></div>
</div>

<button id="unlock-btn" onclick="unlock()" title="Activar audio"></button>

<script>
const SUPABASE_URL = 'https://vgnvhwiaqlcatnzvjhop.supabase.co';
const SUPABASE_KEY = 'sb_publishable_5Y4D-pQL1z_cPmgAo1yiJA_zTHPbIc8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── BARS ──
const wf = document.getElementById('waveform');
const bars = [];
for (let i = 0; i < 12; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  wf.appendChild(b);
  bars.push(b);
}

let raf;
function animBars() {
  cancelAnimationFrame(raf);
  let t = 0;
  (function loop() {
    raf = requestAnimationFrame(loop);
    t += 0.09;
    bars.forEach((b,i) => {
      const v = Math.abs(Math.sin(t + i*0.45)) * 0.65 + Math.random()*0.35;
      b.style.height = (4 + v*32) + 'px';
    });
  })();
}
function stopBars() {
  cancelAnimationFrame(raf);
  bars.forEach(b => b.style.height = '4px');
}

// ── AUDIO UNLOCK ──
async function unlock() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    await ctx.resume();
    const b = ctx.createBuffer(1,1,22050);
    const s = ctx.createBufferSource();
    s.buffer=b; s.connect(ctx.destination); s.start(0);
    document.getElementById('unlock-btn').style.display='none';
  } catch(e){}
}
// Try auto-unlock (works in OBS)
try {
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  ctx.resume();
} catch(e){}

// ── STATE ──
let busy = false;
let t1, t2, audio;

function release() {
  console.log('release() called, busy was:', busy);
  clearTimeout(t1);
  clearTimeout(t2);
  if (audio) { try{audio.pause();audio.src='';}catch(e){} audio=null; }
  stopBars();
  const card = document.getElementById('card');
  card.classList.add('hiding');
  setTimeout(() => {
    card.classList.remove('visible','hiding');
    busy = false;
    console.log('busy reset to false');
  }, 420);
}

function play(item) {
  busy = true;

  document.getElementById('sender').textContent = item.sender_name || 'Anónimo';
  document.getElementById('avatar').textContent = (item.sender_name||'?')[0].toUpperCase();

  const card = document.getElementById('card');
  card.classList.remove('hiding');
  card.classList.add('visible');
  animBars();

  // Safety: always release after 90s
  t1 = setTimeout(release, 90000);

  audio = new Audio(item.audio_url);
  audio.volume = 1;

  audio.onended = () => {
    console.log('audio ended, releasing...');
    clearTimeout(t1);
    stopBars();
    t2 = setTimeout(release, 2000);
  };

  audio.onerror = (e) => {
    console.log('audio error:', e);
    clearTimeout(t1);
    stopBars();
    t2 = setTimeout(release, 2000);
  };

  audio.play().catch((e) => {
    const dur = (item.duration && item.duration > 0) ? item.duration * 1000 : 15000;
    console.log('autoplay blocked:', e.message, '| will release in', dur, 'ms');
    clearTimeout(t1);
    animBars();
    t2 = setTimeout(release, dur);
  });
}

// ── POLLING ──
const seen = new Set();
let startTime;

async function poll(recipientId) {
  if (busy) return;
  const { data } = await sb
    .from('overlay_queue')
    .select('*')
    .eq('recipient_id', recipientId)
    .gte('created_at', startTime)
    .order('created_at', { ascending: true })
    .limit(1);

  if (!data?.length) return;
  const item = data[0];
  if (seen.has(item.id)) return;
  seen.add(item.id);

  const { error } = await sb.from('overlay_queue').delete().eq('id', item.id);
  if (error) { seen.delete(item.id); return; }

  play(item);
}

// ── INIT ──
async function init() {
  const slug = new URLSearchParams(window.location.search).get('u');
  if (!slug) return;

  const { data: profile } = await sb.from('profiles').select('id').eq('slug', slug).single();
  if (!profile) return;

  // Clear stale queue
  await sb.from('overlay_queue').delete().eq('recipient_id', profile.id);
  startTime = new Date().toISOString();

  setInterval(() => poll(profile.id), 2000);
}

init();
</script>
</body>
</html>
